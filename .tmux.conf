set -g base-index 1
setw -g pane-base-index 1
setw -g mouse on
set -sg escape-time 10

# style
set -g status-position top
set -g status-justify absolute-centre
set -g status-style 'fg=color7 bg=default'
set -g status-right ''

set -g status-left '#S'
set -g status-left-style 'fg=color6'
set -g status-right-length 0
set -g status-left-length 100
setw -g window-status-current-style 'fg=colour6 bg=default bold'
setw -g window-status-current-format '#I:#W '
setw -g window-status-style 'fg=color8'

setw -g window-status-style 'fg=gray bg=default bold'
setw -g window-status-format '#I:#W '

bind r source-file ~/.tmux.conf \; display-message "Reloaded!"
bind a display-popup -E "$HOME/.sess"

# unbind C-b
# set -g prefix C-@
# bind C-@ send-prefix
set -g prefix C-b
bind C-b send-prefix

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
